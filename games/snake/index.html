<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        body {
            background-color: #333;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }
        #game-board {
            background-color: #000;
            border: 2px solid #555;
            display: grid;
            grid-template-rows: repeat(20, 1fr);
            grid-template-columns: repeat(20, 1fr);
            width: 100%;
            height: 100%;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }
        #overlay-message { margin-bottom: 20px; }
        #start-btn {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .snake { background-color: #0f0; }
        .food { background-color: #f00; }
        #score { font-size: 1.5em; margin-top: 10px; }
        #instructions { font-size: 0.9em; margin-top: 5px; color: #aaa; }
    </style>
</head>
<body>
    <h1>贪吃蛇</h1>
    <div id="game-container">
        <div id="game-board"></div>
        <div id="overlay">
            <div id="overlay-message">准备好了吗？</div>
            <button id="start-btn">开始游戏</button>
        </div>
    </div>
    <div id="score">得分: 0</div>
    <div id="instructions">使用方向键 (↑ ↓ ← →) 控制</div>

    <script>
        const board = document.getElementById('game-board');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const overlayMessage = document.getElementById('overlay-message');

        const gridSize = 20;
        let snake, food, direction, score, gameOver, gameSpeed, gameLoop;
        let gameStarted = false;

        function initGame() {
            snake = [{ x: 10, y: 10 }];
            food = {};
            direction = 'right';
            score = 0;
            gameOver = false;
            gameSpeed = 200;
            scoreElement.textContent = `得分: ${score}`;
            placeFood();
            clearBoard();
            drawSnake();
            drawFood();
        }

        function startGame() {
            gameStarted = true;
            overlay.style.display = 'none';
            initGame();
            gameLoop = setInterval(main, gameSpeed);
        }
        
        function main() {
            if (gameOver) {
                clearInterval(gameLoop);
                gameStarted = false;
                overlayMessage.textContent = `游戏结束! 得分: ${score}`;
                startBtn.textContent = '重新开始';
                overlay.style.display = 'flex';
                return;
            }
            moveSnake();
            if (!gameOver) { // Re-check after moving
                clearBoard();
                drawFood();
                drawSnake();
            }
        }
        
        function clearBoard() { board.innerHTML = ''; }

        function drawSnake() {
            snake.forEach(segment => {
                const el = document.createElement('div');
                el.style.gridRowStart = segment.y;
                el.style.gridColumnStart = segment.x;
                el.classList.add('snake');
                board.appendChild(el);
            });
        }
        
        function drawFood() {
            const el = document.createElement('div');
            el.style.gridRowStart = food.y;
            el.style.gridColumnStart = food.x;
            el.classList.add('food');
            board.appendChild(el);
        }

        function moveSnake() {
            const head = { ...snake[0] };
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.textContent = `得分: ${score}`;
                placeFood();
                // Speed up logic could be added here
            } else {
                snake.pop();
            }
            checkCollision();
        }
        
        function checkCollision() {
            const head = snake[0];
            if (head.x < 1 || head.x > gridSize || head.y < 1 || head.y > gridSize) {
                gameOver = true;
            }
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver = true;
                }
            }
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * gridSize) + 1;
            food.y = Math.floor(Math.random() * gridSize) + 1;
        }
        
        document.addEventListener('keydown', e => {
            if (!gameStarted) return;
            // Prevent page scroll
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
            
            switch (e.key) {
                case 'ArrowUp': if (direction !== 'down') direction = 'up'; break;
                case 'ArrowDown': if (direction !== 'up') direction = 'down'; break;
                case 'ArrowLeft': if (direction !== 'right') direction = 'left'; break;
                case 'ArrowRight': if (direction !== 'left') direction = 'right'; break;
            }
        });

        startBtn.addEventListener('click', startGame);
        initGame(); // Initial draw before starting
    </script>
</body>
</html>
