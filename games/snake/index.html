<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        body {
            background-color: #333;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 10px auto;
        }
        #game-board {
            background-color: #000;
            border: 2px solid #555;
            display: grid;
            grid-template-rows: repeat(20, 1fr);
            grid-template-columns: repeat(20, 1fr);
            width: 100%;
            height: 100%;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            display: flex; /* 改为 flex 以便控制显示 */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            z-index: 10;
        }
        .hidden {
            display: none; /* 用于隐藏遮罩层 */
        }
        #overlay-message { margin-bottom: 20px; }
        #start-btn {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .snake { background-color: #0f0; }
        .food { background-color: #f00; }
        #score { font-size: 1.5em; margin-top: 10px; }
        #instructions { font-size: 0.9em; margin-top: 5px; color: #aaa; }
    </style>
</head>
<body>
    <h1>贪吃蛇</h1>
    <div id="game-container">
        <div id="game-board"></div>
        <div id="overlay">
            <div id="overlay-message">准备好了吗？</div>
            <button id="start-btn">开始游戏</button>
        </div>
    </div>
    <div id="score">得分: 0</div>
    <div id="instructions">使用方向键 (↑ ↓ ← →) 控制</div>

    <script>
        // DOM Elements
        const board = document.getElementById('game-board');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const overlayMessage = document.getElementById('overlay-message');

        // Game Constants
        const GRID_SIZE = 20;
        const INITIAL_SPEED = 200;

        // Game State Variables
        let snake, food, direction, score, gameSpeed, gameLoopInterval;
        let gameRunning = false;

        // --- Core Game Logic ---

        function gameTick() {
            if (!gameRunning) return;

            moveSnake();

            if (checkCollision()) {
                endGame();
            } else {
                updateBoard();
            }
        }

        function startGame() {
            gameRunning = true;
            overlay.classList.add('hidden'); // 隐藏遮罩层

            // Reset game state
            snake = [{ x: 10, y: 10 }];
            direction = 'right';
            score = 0;
            gameSpeed = INITIAL_SPEED;
            updateScore();
            placeFood();
            
            // Start the game loop
            gameLoopInterval = setInterval(gameTick, gameSpeed);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameLoopInterval); // 停止游戏循环
            
            overlayMessage.textContent = `游戏结束! 得分: ${score}`;
            startBtn.textContent = '重新开始';
            overlay.classList.remove('hidden'); // 显示遮罩层
        }

        // --- Snake and Board Management ---

        function moveSnake() {
            const head = { ...snake[0] }; // Copy the head
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            snake.unshift(head);

            // Check for food
            if (head.x === food.x && head.y === food.y) {
                score++;
                updateScore();
                placeFood();
            } else {
                snake.pop(); // Remove tail
            }
        }

        function checkCollision() {
            const head = snake[0];
            // Wall collision
            if (head.x < 1 || head.x > GRID_SIZE || head.y < 1 || head.y > GRID_SIZE) {
                return true;
            }
            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * GRID_SIZE) + 1,
                y: Math.floor(Math.random() * GRID_SIZE) + 1
            };
            // Ensure food doesn't spawn on the snake
            for (const segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood(); // Recursively find a new spot
                    return;
                }
            }
        }

        // --- Drawing and UI ---

        function updateBoard() {
            board.innerHTML = ''; // Clear previous state
            drawElement(food, 'food');
            snake.forEach(segment => drawElement(segment, 'snake'));
        }

        function drawElement(pos, className) {
            const el = document.createElement('div');
            el.style.gridRowStart = pos.y;
            el.style.gridColumnStart = pos.x;
            el.classList.add(className);
            board.appendChild(el);
        }
        
        function updateScore() {
            scoreElement.textContent = `得分: ${score}`;
        }
        
        // --- Event Handlers ---

        function handleKeyPress(e) {
            if (!gameRunning) return;

            const key = e.key;
            const goingUp = direction === 'up';
            const goingDown = direction === 'down';
            const goingLeft = direction === 'left';
            const goingRight = direction === 'right';

            // Prevent page scrolling with arrow keys during the game
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                e.preventDefault();
            }

            if (key === 'ArrowUp' && !goingDown) direction = 'up';
            else if (key === 'ArrowDown' && !goingUp) direction = 'down';
            else if (key === 'ArrowLeft' && !goingRight) direction = 'left';
            else if (key === 'ArrowRight' && !goingLeft) direction = 'right';
        }

        // --- Initialization ---

        startBtn.addEventListener('click', startGame);
        document.addEventListener('keydown', handleKeyPress);
        
        // Draw the initial empty board on page load
        board.innerHTML = ''; 

    </script>
</body>
</html>
