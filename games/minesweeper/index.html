<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f0f0; }
        #game-container { text-align: center; background: #c0c0c0; padding: 10px; border: 2px solid; border-color: #fff #808080 #808080 #fff; }
        .header { display: flex; justify-content: space-between; padding: 5px; margin-bottom: 10px; border: 2px solid; border-color: #808080 #fff #fff #808080; }
        .info { background: #000; color: #f00; font-family: 'DS-Digital', sans-serif; padding: 5px 10px; font-size: 24px; }
        #status-btn { width: 30px; height: 30px; font-size: 20px; border: 2px solid; border-color: #fff #808080 #808080 #fff; background: #c0c0c0; }
        #mine-field { display: grid; border: 2px solid; border-color: #808080 #fff #fff #808080; }
        .cell { width: 20px; height: 20px; background-color: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; box-sizing: border-box; float: left; text-align: center; line-height: 16px; font-weight: bold; }
        .cell.revealed { background-color: #bbb; border: 1px solid #999; }
        .cell.flagged::before { content: '🚩'; }
        .cell.mine::before { content: '💣'; }
        .c1 { color: #0000ff; } .c2 { color: #008000; } .c3 { color: #ff0000; }
        .c4 { color: #000080; } .c5 { color: #800000; } .c6 { color: #008080; }
        .c7 { color: #000000; } .c8 { color: #808080; }
    </style>
</head>
<body>
<div id="game-container">
    <div class="header">
        <div id="mines-left" class="info">010</div>
        <button id="status-btn">🙂</button>
        <div id="timer" class="info">000</div>
    </div>
    <div id="mine-field"></div>
</div>

<script>
    const mineField = document.getElementById('mine-field');
    const statusBtn = document.getElementById('status-btn');
    const minesLeftEl = document.getElementById('mines-left');
    const timerEl = document.getElementById('timer');

    const ROWS = 16, COLS = 16, MINES = 40;
    let board = [];
    let minesLeft, timer, gameInterval;
    let gameOver = false, firstClick = true;

    function init() {
        gameOver = false;
        firstClick = true;
        minesLeft = MINES;
        timer = 0;
        statusBtn.textContent = '🙂';
        updateInfo();
        clearInterval(gameInterval);
        
        mineField.innerHTML = '';
        mineField.style.gridTemplateColumns = `repeat(${COLS}, 20px)`;
        board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null).map(() => ({ isMine: false, isRevealed: false, isFlagged: false, neighbors: 0 })));

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.addEventListener('click', onCellClick);
                cell.addEventListener('contextmenu', onCellRightClick);
                mineField.appendChild(cell);
            }
        }
    }

    function placeMines(startR, startC) {
        let minesPlaced = 0;
        while (minesPlaced < MINES) {
            const r = Math.floor(Math.random() * ROWS);
            const c = Math.floor(Math.random() * COLS);
            if (!board[r][c].isMine && !(r === startR && c === startC)) {
                board[r][c].isMine = true;
                minesPlaced++;
            }
        }
        
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (!board[r][c].isMine) {
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc].isMine) {
                                count++;
                            }
                        }
                    }
                    board[r][c].neighbors = count;
                }
            }
        }
    }
    
    function onCellClick(e) {
        if (gameOver) return;
        const r = parseInt(e.target.dataset.row);
        const c = parseInt(e.target.dataset.col);
        
        if (firstClick) {
            placeMines(r, c);
            firstClick = false;
            gameInterval = setInterval(() => { timer++; updateInfo(); }, 1000);
        }
        
        const cell = board[r][c];
        if (cell.isFlagged || cell.isRevealed) return;
        
        if (cell.isMine) {
            endGame(false);
            return;
        }
        
        revealCell(r, c);
        checkWin();
    }

    function onCellRightClick(e) {
        e.preventDefault();
        if (gameOver) return;
        const r = parseInt(e.target.dataset.row);
        const c = parseInt(e.target.dataset.col);
        const cell = board[r][c];
        
        if (cell.isRevealed) return;
        
        cell.isFlagged = !cell.isFlagged;
        minesLeft += cell.isFlagged ? -1 : 1;
        updateInfo();
        drawBoard();
    }
    
    function revealCell(r, c) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS || board[r][c].isRevealed) return;
        
        const cell = board[r][c];
        cell.isRevealed = true;
        
        if (cell.neighbors === 0 && !cell.isMine) {
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    revealCell(r + dr, c + dc);
                }
            }
        }
        drawBoard();
    }
    
    function endGame(isWin) {
        gameOver = true;
        clearInterval(gameInterval);
        statusBtn.textContent = isWin ? '😎' : '😵';
        if (!isWin) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c].isMine) {
                        board[r][c].isRevealed = true;
                    }
                }
            }
        }
        drawBoard();
    }

    function checkWin() {
        let revealedCount = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c].isRevealed) revealedCount++;
            }
        }
        if (revealedCount === ROWS * COLS - MINES) {
            endGame(true);
        }
    }
    
    function drawBoard() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cellEl = mineField.children[r * COLS + c];
                const cellData = board[r][c];
                cellEl.className = 'cell'; // Reset classes
                
                if (cellData.isRevealed) {
                    cellEl.classList.add('revealed');
                    if (cellData.isMine) {
                        cellEl.classList.add('mine');
                    } else if (cellData.neighbors > 0) {
                        cellEl.textContent = cellData.neighbors;
                        cellEl.classList.add(`c${cellData.neighbors}`);
                    }
                } else if (cellData.isFlagged) {
                    cellEl.classList.add('flagged');
                }
            }
        }
    }
    
    function updateInfo() {
        minesLeftEl.textContent = String(minesLeft).padStart(3, '0');
        timerEl.textContent = String(timer).padStart(3, '0');
    }

    statusBtn.addEventListener('click', init);
    init();
</script>
</body>
</html>
