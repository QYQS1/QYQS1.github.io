<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        body {
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            background-color: #faf8ef;
            color: #776e65;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            width: 340px;
        }
        .heading {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1.title {
            font-size: 50px;
            font-weight: bold;
            margin: 0;
        }
        .scores-container {
            display: flex;
        }
        .score-container, .best-container {
            background: #bbada0;
            padding: 8px 15px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 3px;
            color: white;
            text-align: center;
            margin-left: 5px;
        }
        .score-container::before, .best-container::before {
            content: attr(data-label);
            display: block;
            color: #eee4da;
            font-size: 10px;
        }
        .above-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .game-intro { font-size: 14px; }
        .restart-button {
            background: #8f7a66;
            border-radius: 3px;
            padding: 8px 15px;
            color: #f9f6f2;
            cursor: pointer;
            font-weight: bold;
        }
        .game-container {
            margin-top: 20px;
            position: relative;
            padding: 10px;
            background: #bbada0;
            border-radius: 6px;
            width: 320px;
            height: 320px;
            box-sizing: border-box;
        }
        .grid-container {
            position: absolute;
            z-index: 1;
        }
        .grid-row {
            margin-bottom: 10px;
        }
        .grid-row:last-child {
            margin-bottom: 0;
        }
        .grid-cell {
            width: 65px;
            height: 65px;
            margin-right: 10px;
            float: left;
            border-radius: 3px;
            background: rgba(238, 228, 218, 0.35);
        }
        .grid-cell:last-child {
            margin-right: 0;
        }
        .tile-container {
            position: absolute;
            z-index: 2;
        }
        .tile {
            position: absolute;
            width: 65px;
            height: 65px;
            border-radius: 3px;
            line-height: 65px;
            text-align: center;
            font-weight: bold;
            font-size: 35px;
            transition: 100ms ease-in-out;
        }
        
        .tile.tile-2 { background: #eee4da; color: #776e65; }
        .tile.tile-4 { background: #ede0c8; color: #776e65; }
        .tile.tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile.tile-16 { background: #f59563; color: #f9f6f2; }
        .tile.tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile.tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile.tile-128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
        .tile.tile-256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
        .tile.tile-512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
        .tile.tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 25px; }
        .tile.tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 25px; }

        .game-message {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            z-index: 100;
            text-align: center;
            animation: fade-in 800ms;
        }
        .game-message p {
            font-size: 40px;
            font-weight: bold;
            margin-top: 100px;
        }
        .game-message .lower {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .retry-button {
            display: inline-block;
            background: #8f7a66;
            border-radius: 3px;
            padding: 10px 20px;
            color: #f9f6f2;
            cursor: pointer;
            font-weight: bold;
        }
        @keyframes fade-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="heading">
        <h1 class="title">2048</h1>
        <div class="scores-container">
            <div class="score-container" data-label="SCORE">0</div>
            <div class="best-container" data-label="BEST">0</div>
        </div>
    </div>
    <div class="above-game">
        <p class="game-intro">合并数字，得到 <strong>2048!</strong></p>
        <a class="restart-button">新游戏</a>
    </div>
    <div class="game-container">
        <div class="game-message">
            <p></p>
            <div class="lower">
                <a class="retry-button">再试一次</a>
            </div>
        </div>
        <div class="grid-container"></div>
        <div class="tile-container"></div>
    </div>
    <p class="game-explanation">
        <strong class="important">玩法:</strong> 使用你的 <strong>方向键</strong> 移动方块。当两个数字相同的方块碰撞时，它们会 <strong>合并成一个!</strong>
    </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const gridContainer = document.querySelector('.grid-container');
    const tileContainer = document.querySelector('.tile-container');
    const scoreContainer = document.querySelector('.score-container');
    const bestContainer = document.querySelector('.best-container');
    const messageContainer = document.querySelector('.game-message');
    const restartButtons = document.querySelectorAll('.restart-button, .retry-button');
    const size = 4;
    let grid = [];
    let score = 0;
    let bestScore = localStorage.getItem('2048-best-score') || 0;

    function setupInput() {
        window.addEventListener('keydown', handleKeydown);
        restartButtons.forEach(btn => btn.addEventListener('click', startGame));
    }
    
    function handleKeydown(event) {
        if (event.defaultPrevented) return;
        let moved = false;
        switch (event.key) {
            case "ArrowDown":  moved = move('down'); break;
            case "ArrowUp":    moved = move('up'); break;
            case "ArrowLeft":  moved = move('left'); break;
            case "ArrowRight": moved = move('right'); break;
            default: return;
        }
        if (moved) {
            addRandomTile();
            updateView();
            if (!movesAvailable()) {
                endGame();
            }
        }
        event.preventDefault();
    }

    function startGame() {
        grid = Array(size * size).fill(null);
        score = 0;
        messageContainer.style.display = 'none';
        updateBestScore();
        updateScore(0);
        addRandomTile();
        addRandomTile();
        updateView();
    }

    function updateView() {
        tileContainer.innerHTML = '';
        grid.forEach((value, index) => {
            if (value) {
                const tile = document.createElement('div');
                const {x, y} = indexToPos(index);
                tile.className = `tile tile-${value}`;
                tile.textContent = value;
                tile.style.transform = `translate(${x * 75}px, ${y * 75}px)`;
                tileContainer.appendChild(tile);
            }
        });
    }

    function addRandomTile() {
        const emptyCells = grid.map((val, idx) => val === null ? idx : -1).filter(val => val !== -1);
        if (emptyCells.length > 0) {
            const index = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            const value = Math.random() < 0.9 ? 2 : 4;
            grid[index] = value;
        }
    }
    
    function move(direction) {
        let moved = false;
        const vectors = { up: {x: 0, y: -1}, down: {x: 0, y: 1}, left: {x: -1, y: 0}, right: {x: 1, y: 0} };
        const vector = vectors[direction];
        
        let traversals = buildTraversals(vector);
        
        traversals.x.forEach(x => {
            traversals.y.forEach(y => {
                const cellIndex = posToIndex({x, y});
                if (grid[cellIndex]) {
                    const positions = findFarthestPosition({x, y}, vector);
                    const nextIndex = posToIndex(positions.next);
                    
                    if (nextIndex !== cellIndex && grid[nextIndex] === null) {
                         grid[nextIndex] = grid[cellIndex];
                         grid[cellIndex] = null;
                         moved = true;
                    } else if (positions.next.x >= 0 && positions.next.x < size && positions.next.y >= 0 && positions.next.y < size && grid[nextIndex] === grid[cellIndex]) {
                         grid[nextIndex] *= 2;
                         updateScore(grid[nextIndex]);
                         grid[cellIndex] = null;
                         moved = true;
                    }
                }
            });
        });
        return moved;
    }
    
    function buildTraversals(vector) {
        const traversals = { x: [], y: [] };
        for (let pos = 0; pos < size; pos++) {
            traversals.x.push(pos);
            traversals.y.push(pos);
        }
        if (vector.x === 1) traversals.x = traversals.x.reverse();
        if (vector.y === 1) traversals.y = traversals.y.reverse();
        return traversals;
    }

    function findFarthestPosition(cell, vector) {
        let previous;
        do {
            previous = cell;
            cell = { x: previous.x + vector.x, y: previous.y + vector.y };
        } while (withinBounds(cell) && !grid[posToIndex(cell)]);
        
        let nextPos = { x: previous.x + vector.x, y: previous.y + vector.y };
        if (withinBounds(nextPos) && grid[posToIndex(nextPos)] === grid[posToIndex({x: previous.x, y: previous.y})]) {
            return { farthest: nextPos, next: nextPos };
        }
        
        return { farthest: previous, next: previous };
    }

    function movesAvailable() {
        for (let i = 0; i < grid.length; i++) {
            if (grid[i] === null) return true;
            const {x, y} = indexToPos(i);
            if (x < size - 1 && grid[i] === grid[posToIndex({x: x + 1, y})]) return true;
            if (y < size - 1 && grid[i] === grid[posToIndex({x, y: y + 1})]) return true;
        }
        return false;
    }
    
    function endGame() {
        messageContainer.style.display = 'flex';
        messageContainer.querySelector('p').textContent = '游戏结束!';
    }
    
    function updateScore(increment) {
        score += increment;
        scoreContainer.textContent = score;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('2048-best-score', bestScore);
            updateBestScore();
        }
    }
    
    function updateBestScore() {
        bestContainer.textContent = bestScore;
    }

    function createGrid() {
        for (let i = 0; i < size * size; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            gridContainer.appendChild(cell);
        }
    }
    
    // Helpers
    const posToIndex = ({x, y}) => y * size + x;
    const indexToPos = index => ({ x: index % size, y: Math.floor(index / size) });
    const withinBounds = ({x, y}) => x >= 0 && x < size && y >= 0 && y < size;

    createGrid();
    setupInput();
    startGame();
});
</script>
</body>
</html>
