<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #222; font-family: sans-serif; }
        #game-container { display: flex; align-items: flex-start; border: 2px solid #555; padding: 10px; background: #333; }
        canvas { border: 1px solid #555; background: #000; }
        #info { margin-left: 20px; color: #eee; width: 120px; }
        #info div { margin-bottom: 10px; }
        button { width: 100%; padding: 10px; margin-top: 10px; background: #555; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="tetris" width="240" height="480"></canvas>
    <div id="info">
        <h2>俄罗斯方块</h2>
        <div>得分: <span id="score">0</span></div>
        <div>下一个:</div>
        <canvas id="next" width="80" height="80"></canvas>
        <div id="instructions" style="font-size:0.8em; margin-top:10px;">← →: 移动<br>↑: 旋转<br>↓: 加速<br>空格: 瞬移</div>
        <button id="start-btn">开始游戏</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next');
    const nextContext = nextCanvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const startButton = document.getElementById('start-btn');

    context.scale(24, 24);
    nextContext.scale(20, 20);

    const COLS = 10;
    const ROWS = 20;
    let arena = createMatrix(COLS, ROWS);
    let score = 0;
    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
    let nextPiece = null;
    let gameRunning = false;

    const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
    const pieces = 'TJLOSZI';

    function createPiece(type) {
        if (type === 'T') return [[0,0,0],[1,1,1],[0,1,0]];
        if (type === 'J') return [[0,2,0],[0,2,0],[2,2,0]];
        if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
        if (type === 'O') return [[4,4],[4,4]];
        if (type === 'S') return [[0,5,5],[5,5,0],[0,0,0]];
        if (type === 'Z') return [[6,6,0],[0,6,6],[0,0,0]];
        if (type === 'I') return [[0,7,0,0],[0,7,0,0],[0,7,0,0],[0,7,0,0]];
    }

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) { matrix.push(new Array(w).fill(0)); }
        return matrix;
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) {
                    continue outer;
                }
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            score += rowCount * 10;
            rowCount *= 2;
        }
    }

    function draw() {
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, {x: 0, y: 0}, context);
        drawMatrix(player.matrix, player.pos, context);
        drawNext();
    }
    
    function drawNext() {
        nextContext.fillStyle = '#333';
        nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
        if (nextPiece) {
           drawMatrix(nextPiece, {x: (4 - nextPiece[0].length)/2, y: (4-nextPiece.length)/2 }, nextContext);
        }
    }

    function drawMatrix(matrix, offset, ctx) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    ctx.fillStyle = colors[value];
                    ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function playerReset() {
        player.matrix = nextPiece || createPiece(pieces[pieces.length * Math.random() | 0]);
        nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            gameRunning = false;
            startButton.style.display = 'block';
            startButton.textContent = '重新开始';
            alert('游戏结束! 得分: ' + score);
        }
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }
    
    function playerHardDrop() {
        while(!collide(arena, player)) {
            player.pos.y++;
        }
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) {
            matrix.forEach(row => row.reverse());
        } else {
            matrix.reverse();
        }
    }

    function update(time = 0) {
        if(!gameRunning) return;
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }
        draw();
        requestAnimationFrame(update);
    }
    
    function updateScore() {
        scoreElement.innerText = score;
    }

    document.addEventListener('keydown', event => {
        if(!gameRunning) return;

        const keysToPrevent = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '];
        if (keysToPrevent.includes(event.key)) {
            event.preventDefault();
        }

        if (event.key === 'ArrowLeft') playerMove(-1);
        else if (event.key === 'ArrowRight') playerMove(1);
        else if (event.key === 'ArrowDown') playerDrop();
        else if (event.key === 'ArrowUp') playerRotate(1);
        else if (event.key === ' ') playerHardDrop();
    });
    
    startButton.addEventListener('click', () => {
        gameRunning = true;
        startButton.style.display = 'none';
        arena.forEach(row => row.fill(0));
        score = 0;
        updateScore();
        playerReset();
        update();
    });

    draw(); // Initial draw
</script>
</body>
</html>
